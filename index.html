<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epilexus - Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .navbar {
            background-color: #5a403b;
            padding: 1rem 0;
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar .logo {
            font-size: 2rem;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .navbar .nav-links {
            list-style-type: none;
            display: flex;
        }

        .navbar .nav-links li {
            margin-left: 2rem;
        }

        .navbar .nav-links li a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s ease-in-out;
        }

        .navbar .nav-links li a:hover {
            color: #45ADA8;
        }

        .navbar .nav-links li a#shopLink {
            margin-top: 5px; /* Move Shop button a few pixels down */
            text-decoration: none; /* Remove underline */
        }

        .hero-section {
            background-color: #f8ecd6;
            padding: 5rem 0;
            text-align: center;
            color: #5a403b;
        }

        .hero-section h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .hero-section p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 1rem 2rem;
            background-color: #5a403b;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.1rem;
            transition: background-color 0.3s ease-in-out;
        }

        .btn:hover {
            background-color: #3e2b26;
        }

        footer {
            background-color: #5a403b;
            color: white;
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="container">
            <h1 class="logo">Epilexus</h1>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="order.html" id="shopLink">Shop</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero-section">
        <h1>Welcome to Epilexus</h1>
        <p>Order your Epilexus device now and experience a new era of technology.</p>
        <a href="order.html" class="btn">Order Now</a>
    </section>

    <footer>
        <p>© 2024 Epilexus. All Rights Reserved.</p>
        <p>Contact Us: <a href="mailto:info@epilexus.charm.rest">info@epilexus.charm.rest</a></p>
    </footer>
</body>
</html>
